name: "🛠 タスク"
description: "実装・修正・リファクタリングなどの作業タスク"
title: "[Task]: "
labels: ["task", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        実装タスク用のテンプレートです。
        できるだけ、単独で着手できる小さな単位にしてください。

  - type: textarea
    id: goal
    attributes:
      label: "目的"
      description: "このタスクで達成したいことを書いてください。"
      placeholder: "例: Issue テンプレートを追加し、バグ報告の品質を上げる。"
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: "作業範囲"
      description: "この Issue で対応する範囲を書いてください。"
      placeholder: |
        対応すること:
        - ...

        対応しないこと:
        - ...
    validations:
      required: true

  - type: textarea
    id: approach
    attributes:
      label: "実装方針"
      description: "想定している進め方があれば書いてください。"
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: "完了条件"
      description: "この Issue を閉じられる条件を書いてください。"
      placeholder: |
        - [ ] ...
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: "依存関係・ブロッカー"
      description: "先に対応が必要な Issue や外部要因があれば書いてください。"
      placeholder: "例: #12 が完了してから対応する。"
    validations:
      required: false

  - type: dropdown
    id: size
    attributes:
      label: "想定サイズ"
      options:
        - "XS: すぐ終わる"
        - "S: 小さめ"
        - "M: 普通"
        - "L: 大きめ。分割を検討"
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: "確認事項"
      options:
        - label: "この Issue は単独で着手できる粒度です"
          required: false
        - label: "完了条件を記載しました"
          required: true
        - label: "必要な依存関係を記載しました"
          required: false