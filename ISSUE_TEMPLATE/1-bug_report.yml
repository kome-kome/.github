name: バグ報告
description: 再現可能な不具合を報告します
title: "[Bug]: "
labels: ["bug", "triage"]

body:
  - type: markdown
    attributes:
      value: |
        バグ報告ありがとうございます。
        調査しやすくするため、再現手順・期待結果・実際の結果をできるだけ具体的に記入してください。

  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何が起きているかを簡潔に説明してください。
      placeholder: 例：ログイン後にダッシュボードへ遷移せず、エラー画面が表示される
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: 問題を再現するための手順を書いてください。
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
      description: 本来どう動くべきかを書いてください。
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 実際の動作
      description: 実際に何が起きたかを書いてください。
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 環境
      description: OS、ブラウザ、Node.js、パッケージバージョンなど、関係しそうな情報を書いてください。
      placeholder: |
        - OS:
        - Browser:
        - Node.js:
        - Package version:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: ログ・エラー内容
      description: エラーメッセージやログがあれば貼り付けてください。
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 補足情報
      description: スクリーンショット、関連 Issue、回避策などがあれば記入してください。
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: 確認事項
      options:
        - label: 同じ内容の Issue が既に存在しないことを確認しました。
          required: true
        - label: 再現手順を記載しました。
          required: true